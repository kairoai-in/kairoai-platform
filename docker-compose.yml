services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kairoai}
      POSTGRES_USER: ${POSTGRES_USER:-kairoai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kairoai}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kairoai} -d ${POSTGRES_DB:-kairoai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-kairoai}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-kairoai}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  review-orchestrator:
    build:
      context: ../kairoai-review-orchestrator
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    environment:
      ENVIRONMENT: local
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kairoai:kairoai@postgres:5432/kairoai}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://kairoai:kairoai@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-rpc://}
      ENABLE_TASK_DISPATCH: ${ENABLE_TASK_DISPATCH:-false}
      GITHUB_SERVICE_URL: ${GITHUB_SERVICE_URL:-http://github-service:8000}
      TERRAFORM_RUNNER_URL: ${TERRAFORM_RUNNER_URL:-http://terraform-runner:8000}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      github-service:
        condition: service_started
      terraform-runner:
        condition: service_started

  review-worker:
    build:
      context: ../kairoai-review-orchestrator
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    command: celery -A kairoai_review_orchestrator.tasks.celery_app.celery_app worker --loglevel=INFO
    environment:
      ENVIRONMENT: local
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kairoai:kairoai@postgres:5432/kairoai}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://kairoai:kairoai@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-rpc://}
      TERRAFORM_RUNNER_URL: ${TERRAFORM_RUNNER_URL:-http://terraform-runner:8000}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      terraform-runner:
        condition: service_started

  api-gateway:
    build:
      context: ../kairoai-api-gateway
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    environment:
      ENVIRONMENT: local
      REVIEW_ORCHESTRATOR_URL: ${REVIEW_ORCHESTRATOR_URL:-http://review-orchestrator:8000}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    ports:
      - "8000:8000"
    depends_on:
      - review-orchestrator

  github-service:
    build:
      context: ../kairoai-github-service
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    environment:
      ENVIRONMENT: local
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
    ports:
      - "8002:8000"

  terraform-runner:
    build:
      context: ../kairoai-terraform-runner
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    environment:
      ENVIRONMENT: local
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      TERRAFORM_BINARY: ${TERRAFORM_BINARY:-terraform}
    ports:
      - "8003:8000"

volumes:
  postgres-data:
  rabbitmq-data:
